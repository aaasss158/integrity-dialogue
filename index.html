<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>千年一晤 · 古今相叙</title>
  <style>
    :root {
      --bg: #0a0a14;
      --panel-bg: rgba(16, 16, 32, 0.9);
      --gold: #c9a84c;
      --gold-light: #e8d48b;
      --cream: #f5f0e1;
      --text: #e0d8c8;
      --text-dim: #8a8578;
      --border: rgba(201, 168, 76, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "STSong","SimSun","Noto Serif SC","Source Han Serif SC",serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh; width: 100vw; overflow: hidden;
      display: flex; flex-direction: column;
    }

    .header {
      position: relative; z-index: 30;
      padding: 8px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(180deg, rgba(10,10,20,0.95) 0%, rgba(10,10,20,0.6) 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header .title {
      font-size: 1.3rem; color: var(--gold); letter-spacing: 0.12em;
      display: flex; align-items: center; gap: 10px;
    }
    .header .title .icon { font-size: 1.4rem; }
    .header .status { font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; transition: all .3s; }
    .status-dot.active { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .status-dot.speaking { background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: glowPulse .8s infinite alternate; }
    @keyframes glowPulse { from { box-shadow: 0 0 4px var(--gold); } to { box-shadow: 0 0 14px var(--gold); } }
    .status-dot.listening { background: #2196f3; box-shadow: 0 0 8px #2196f3; animation: glowPulse2 .8s infinite alternate; }
    @keyframes glowPulse2 { from { box-shadow: 0 0 4px #2196f3; } to { box-shadow: 0 0 14px #2196f3; } }

    .main-container { position: relative; z-index: 5; flex: 1; display: flex; overflow: hidden; }

    /* 场景区 — 默认显示暗色背景，摄像头覆盖其上 */
    .scene-panel {
      flex: 1; position: relative; overflow: hidden; min-width: 0;
      background: radial-gradient(ellipse at 30% 50%, #1a1a2e 0%, #0a0a14 70%);
    }

    .camera-bg {
      position: absolute; inset: 0; z-index: 2;
    }
    .camera-bg video {
      width: 100%; height: 100%; object-fit: cover;
      transform: scaleX(-1); /* 镜像 */
      filter: brightness(0.65) saturate(0.7);
    }
    .camera-fallback {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 30% 50%, #1a1a2e 0%, #0a0a14 70%);
    }
    .camera-fallback .fallback-text {
      color: rgba(201,168,76,0.18); font-size: 1.2rem; letter-spacing: 0.3em;
    }

    /* Canvas 角色层 */
    #char-canvas {
      position: absolute; inset: 0; z-index: 3;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* 暗角遮罩 */
    .vignette {
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse at 70% 50%, transparent 30%, rgba(10,10,20,0.55) 85%);
    }

    .loading-character {
      position: absolute; inset: 0; z-index: 3; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      opacity: 1; transition: opacity .5s;
    }
    .loading-character.hidden { opacity: 0; }
    .loading-character .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 对话面板 */
    .side-panel {
      width: 320px; display: flex; flex-direction: column;
      background: var(--panel-bg); border-left: 1px solid var(--border); z-index: 20;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }
    .dialogue-area {
      flex: 1; overflow-y: auto; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .dialogue-area::-webkit-scrollbar { width: 3px; }
    .dialogue-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      max-width: 94%; padding: 8px 12px; border-radius: 10px;
      font-size: 0.85rem; line-height: 1.6;
      animation: msgIn .3s ease-out;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user {
      align-self: flex-end;
      background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.25);
      color: var(--cream); border-bottom-right-radius: 3px;
    }
    .msg.ai {
      align-self: flex-start;
      background: rgba(93,138,124,.12); border: 1px solid rgba(93,138,124,.2);
      color: var(--text); border-bottom-left-radius: 3px;
    }
    .msg .sender { font-size: 0.68rem; margin-bottom: 3px; font-weight: bold; letter-spacing: .04em; }
    .msg.user .sender { color: #ff9800; }
    .msg.ai .sender { color: #5d8a7c; }

    .msg.ai .speaking-indicator {
      display: none; font-size: 0.65rem; color: var(--gold);
      margin-top: 4px; animation: pulseFade 1s infinite alternate;
    }
    .msg.ai.speaking .speaking-indicator { display: block; }
    .msg.ai.speaking { border-color: rgba(201,168,76,0.4); }
    @keyframes pulseFade { from { opacity: 0.4; } to { opacity: 1; } }

    .input-area {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 6px; align-items: center;
      flex-wrap: wrap;
    }
    .btn.auto-mode {
      width: auto; height: 32px; border-radius: 16px; padding: 0 12px;
      font-size: 0.72rem; letter-spacing: 0.03em;
      background: rgba(76,175,80,0.15); border-color: rgba(76,175,80,0.4);
      color: #8bc34a;
    }
    .btn.auto-mode.off {
      background: rgba(255,255,255,0.03); border-color: var(--border);
      color: var(--text-dim);
    }
    .input-area input {
      flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 18px; padding: 9px 14px; color: var(--cream);
      font-size: 0.85rem; outline: none; transition: border-color .3s;
    }
    .input-area input:focus { border-color: var(--gold); }
    .input-area input::placeholder { color: var(--text-dim); }

    .btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: rgba(255,255,255,.05);
      color: var(--gold); cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .3s; flex-shrink: 0;
    }
    .btn:hover { background: rgba(201,168,76,.15); }
    .btn:active { transform: scale(.93); }
    .btn.recording { background: rgba(244,67,54,.3); border-color: #f44336; animation: recPulse 1.2s infinite; }
    @keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(244,67,54,.4); } 50% { box-shadow: 0 0 0 12px rgba(244,67,54,0); } }
    .btn.send { background: var(--gold); color: #1a1a2e; border: none; }
    .btn.send:hover { background: var(--gold-light); }

    .toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 100;
      background: rgba(0,0,0,.85); color: var(--gold); padding: 8px 20px;
      border-radius: 18px; font-size: 0.8rem; border: 1px solid var(--border);
      animation: toastIn 2s ease-out forwards;
    }
    @keyframes toastIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
      10% { opacity: 1; transform: translateX(-50%) translateY(0); }
      80% { opacity: 1; } 100% { opacity: 0; }
    }

    /* 设置面板 */
    .settings-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .settings-overlay.open { opacity: 1; pointer-events: auto; }
    .settings-panel {
      background: #1a1a2e; border: 1px solid var(--border);
      border-radius: 14px; padding: 24px; width: 90%; max-width: 400px;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
    }
    .settings-panel h3 {
      color: var(--gold); font-size: 1.1rem; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .settings-panel label {
      display: block; color: var(--text-dim); font-size: .78rem; margin-bottom: 5px;
    }
    .settings-panel input {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      color: var(--cream); font-size: .85rem; margin-bottom: 12px;
    }
    .settings-panel .btn-row {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px;
    }
    .settings-panel .btn-sm {
      padding: 6px 18px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,.05); color: var(--text); cursor: pointer;
      font-size: .8rem;
    }
    .settings-panel .btn-sm.primary { background: var(--gold); color: #1a1a2e; border: none; }
    .settings-panel .status-msg { font-size: .75rem; margin-top: 8px; }
    .settings-panel .status-msg.ok { color: #4caf50; }
    .settings-panel .status-msg.warn { color: #ff9800; }
    .header .btn-settings {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      font-size: .85rem; padding: 4px 12px; border-radius: 12px; cursor: pointer;
      transition: all .3s;
    }
    .header .btn-settings:hover { color: var(--gold); border-color: var(--gold); }
    .header .btn-settings.ai-active { color: #4caf50; border-color: #4caf50; }

    @media (max-width: 768px) {
      .main-container { flex-direction: column; }
      .scene-panel { flex: 1; min-height: 50%; }
      .side-panel { width: 100%; max-height: 40%; border-left: none; border-top: 1px solid var(--border); }
      .header .title { font-size: 1rem; }
      .vignette { background: radial-gradient(ellipse at 70% 55%, transparent 20%, rgba(10,10,20,0.5) 80%); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="title">
    <span class="icon">🏛️</span>
    <span>千年一晤 · 古今相叙</span>
  </div>
  <div class="status">
    <button class="btn-settings" id="btnSettings" title="AI 设置">⚙️ AI模型</button>
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">就绪</span>
  </div>
</div>

  <div class="main-container">
    <div class="scene-panel" id="scenePanel">
      <!-- 兜底暗色背景（默认可见） -->
      <div class="camera-fallback" id="cameraFallback">
        <div class="fallback-text">千年一晤 · 古今相叙</div>
      </div>
      <!-- 摄像头覆盖在兜底背景之上 -->
      <div class="camera-bg" id="cameraBg">
        <video id="cameraVideo" autoplay playsinline muted></video>
      </div>
      <!-- 角色Canvas层 -->
      <canvas id="char-canvas"></canvas>
      <div class="loading-character" id="loadingCharacter"><div class="spinner"></div></div>
      <!-- 暗角 -->
      <div class="vignette"></div>
    </div>

  <div class="side-panel">
    <div class="dialogue-area" id="dialogueArea">
      <div class="msg ai">
        <div class="sender">🏛️ 先生</div>
        <div>有礼了。老夫静待千载，今朝终得相逢一叙。</div>
      </div>
    </div>
    <div class="input-area">
      <button class="btn auto-mode" id="autoBtn" title="自动对话模式">🔄 自动</button>
      <input type="text" id="textInput" placeholder="输入你想说的话..." />
      <button class="btn send" id="sendBtn" title="发送">➤</button>
    </div>
  </div>
</div>

<!-- 设置面板 -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h3>AI 模型设置</h3>
    <label>DeepSeek API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-..." />
    <label>System Prompt（角色设定）</label>
    <input type="text" id="systemPromptInput"
      value="你是古代清正廉明的官员，50岁左右，说话温文尔雅、引经据典，用半文言白话。对方是来请教廉洁文化、道德修养之人。回答时：1)引用古代廉政典故（包拯、海瑞、于成龙等）；2)结合现代法规精神；3)语风温和敦厚如长者；4)回答简洁，控制在150字以内。若对方自述困惑或悔过，耐心劝导、指正道义。" />
    <div class="btn-row">
      <button class="btn-sm" id="btnClearKey">清除 Key</button>
      <button class="btn-sm primary" id="btnSaveKey">保存设置</button>
    </div>
    <div class="status-msg" id="settingsMsg"></div>
  </div>
</div>

<script>
// ========== DOM ==========
const canvas = document.getElementById('char-canvas');
const ctx = canvas.getContext('2d');
const dialogueArea = document.getElementById('dialogueArea');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const autoBtn = document.getElementById('autoBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const cameraVideo = document.getElementById('cameraVideo');
const scenePanel = document.getElementById('scenePanel');
const btnSettings = document.getElementById('btnSettings');
const settingsOverlay = document.getElementById('settingsOverlay');
const apiKeyInput = document.getElementById('apiKeyInput');
const systemPromptInput = document.getElementById('systemPromptInput');
const btnSaveKey = document.getElementById('btnSaveKey');
const btnClearKey = document.getElementById('btnClearKey');
const settingsMsg = document.getElementById('settingsMsg');
const loadingCharacter = document.getElementById('loadingCharacter');

// ========== 画布自适应 ==========
function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = scenePanel.clientWidth;
  const h = scenePanel.clientHeight;
  if (w !== canvas.clientWidth * dpr || h !== canvas.clientHeight * dpr) {
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }
}
window.addEventListener('resize', resizeCanvas);

// ========== 状态 ==========
const state = {
  isListening: false,
  isSpeaking: false,
  isThinking: false,
  autoDialogue: true,  // 默认开启自动语音对话
  recognition: null,
  cameraStream: null,
  cameraActive: false,
  time: 0,
  mouthOpen: 0,
  loaded: false,
  aiEnabled: false,    // DeepSeek API 是否已配置
  conversationHistory: [],  // 对话历史（最近10轮）
};

// DeepSeek API 配置
const DEEPSEEK_API = 'https://api.deepseek.com/v1/chat/completions';
const CONVERSATION_MAX = 10; // 保留最近10轮对话

function setStatus(type) {
  statusDot.className = 'status-dot';
  switch (type) {
    case 'ready': statusDot.classList.add('active'); statusText.textContent = '就绪'; break;
    case 'listening': statusDot.classList.add('listening'); statusText.textContent = '聆听中...'; break;
    case 'speaking': statusDot.classList.add('speaking'); statusText.textContent = '讲述中...'; break;
    case 'thinking': statusText.textContent = '思考中...'; break;
  }
}

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function addMessage(sender, text) {
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  div.innerHTML = `<div class="sender">${sender === 'user' ? '💬 你' : '🏛️ 先生'}</div><div>${text}</div>${sender === 'ai' ? '<div class="speaking-indicator">🔊 朗读中...</div>' : ''}`;
  dialogueArea.appendChild(div);
  dialogueArea.scrollTop = dialogueArea.scrollHeight;
  return div; // 返回元素引用，后续可标记朗读状态
}

// ========== 摄像头 ==========
async function startCamera() {
  try {
    state.cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
      audio: false
    });
    cameraVideo.srcObject = state.cameraStream;
    // 视频成功播放后，摄像头画面会覆盖在兜底背景之上，无需隐藏 fallback
    state.cameraActive = true;
  } catch (e) {
    console.log('摄像头未启用:', e.message);
    state.cameraActive = false;
    showToast('摄像头未启用，已切换为默认背景');
  }
}

// ========== 语音识别 ==========
let speechErrorCount = 0;
const statusTextDefault = statusText.textContent;

function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    autoBtn.style.opacity = '0.4';
    autoBtn.title = '当前浏览器不支持语音识别，请用 Chrome 或 Edge';
    autoBtn.textContent = '⚠️ 不支持语音';
    autoBtn.classList.add('off');
    statusText.textContent = '浏览器不支持语音';
    return;
  }
  const rec = new SR();
  rec.lang = 'zh-CN';
  rec.continuous = false;
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  rec.onstart = () => {
    state.isListening = true;
    speechErrorCount = 0; // 重置错误计数
    setStatus('listening');
  };

  rec.onresult = (e) => {
    const text = e.results[0][0].transcript.trim();
    if (text) {
      showToast(`"${text}"`);
      handleUserInput(text);
    }
  };

  rec.onerror = (e) => {
    state.isListening = false;
    const err = e.error;

    if (err === 'no-speech') {
      setStatus('ready');
      // 自动模式静默重试
      if (state.autoDialogue && !state.isSpeaking && !state.isThinking) {
        setTimeout(() => {
          if (state.autoDialogue && !state.isListening) {
            try { rec.start(); } catch(_) {}
          }
        }, 300);
      }
      return;
    }

    if (err === 'aborted') {
      setStatus('ready');
      return;
    }

    // 明确错误：给出提示并停止自动重试
    speechErrorCount++;
    const messages = {
      'not-allowed': '请允许浏览器使用麦克风权限',
      'audio-capture': '未检测到麦克风设备',
      'network': '语音服务连接失败，请检查网络',
      'service-not-allowed': '当前网络不支持语音服务',
      'language-not-supported': '浏览器不支持中文语音',
    };
    const msg = messages[err] || `语音识别异常 (${err})`;
    showToast(msg);
    statusText.textContent = `语音异常: ${err}`;

    // 错误次数过多则切换到手动模式
    if (speechErrorCount >= 3) {
      state.autoDialogue = false;
      autoBtn.classList.add('off');
      autoBtn.textContent = '🔄 手动模式';
      showToast('语音服务异常，已自动切换为手动模式');
    }
  };

  rec.onend = () => {
    state.isListening = false;
    // 仅在正常结束且自动模式下重试，不重试非零错误计数
    if (state.autoDialogue && speechErrorCount === 0 && !state.isSpeaking && !state.isThinking) {
      setTimeout(() => {
        if (state.autoDialogue && !state.isListening && !state.isSpeaking && !state.isThinking) {
          try { rec.start(); } catch(_) {}
        }
      }, 400);
    } else if (!state.autoDialogue) {
      setStatus('ready');
    }
  };

  state.recognition = rec;
}

// ========== 自动对话模式切换 ==========
autoBtn.addEventListener('click', () => {
  state.autoDialogue = !state.autoDialogue;

  if (state.autoDialogue) {
    speechErrorCount = 0;
    autoBtn.classList.remove('off');
    autoBtn.textContent = '🔄 自动对话中';
    showToast('已开启自动语音对话，直接说话即可');
    if (state.recognition && !state.isSpeaking && !state.isThinking) {
      try { state.recognition.start(); } catch(_) {
        showToast('语音启动失败，请确认麦克风权限');
      }
    }
  } else {
    autoBtn.classList.add('off');
    autoBtn.textContent = '🔄 手动模式';
    statusText.textContent = statusTextDefault;
    showToast('已切换为手动输入模式');
    if (state.isListening && state.recognition) state.recognition.stop();
  }
});

// ========== 微软 Edge TTS（WebSocket，国内直连，无需 Key）==========
const EDGE_TTS_URL = 'wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=6A5AA1D4EAFF4E9FB37E23D68491D6F4';
const TTS_VOICE = 'zh-CN-YunxiNeural'; // 云希 — 男声，温润磁性，适合古风先生

// 生成 UUID v4
function uuid4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

async function speakText(text, msgEl) {
  if (msgEl) {
    msgEl.classList.add('speaking');
    const indicator = msgEl.querySelector('.speaking-indicator');
    if (indicator) {
      indicator.textContent = '🔊 朗读中...';
      indicator.style.display = 'block';
      indicator.style.animation = 'pulseFade 1s infinite alternate';
    }
  }

  state.isSpeaking = true;
  setStatus('speaking');

  try {
    const audioBlob = await edgeTTS(text);
    const audioUrl = URL.createObjectURL(audioBlob);
    await playAudio(audioUrl);
    URL.revokeObjectURL(audioUrl);
  } catch (e) {
    console.error('TTS 失败:', e);
    if (msgEl) {
      const indicator = msgEl.querySelector('.speaking-indicator');
      if (indicator) {
        indicator.textContent = '🔇 朗读失败';
        indicator.style.animation = 'none';
        indicator.style.color = '#a66';
      }
    }
  }

  state.isSpeaking = false;
  if (msgEl) {
    msgEl.classList.remove('speaking');
    const indicator = msgEl.querySelector('.speaking-indicator');
    if (indicator) indicator.style.display = 'none';
  }
  setStatus('ready');
  restartListeningIfNeeded();
}

async function edgeTTS(text) {
  // SSML 格式，停顿更自然
  const ssml = `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xmlns:mstts="https://www.w3.org/2001/mstts" xml:lang="zh-CN">
    <voice name="${TTS_VOICE}">
      <mstts:silence type="Sentenceboundary" value="200ms"/>
      ${escapeXml(text)}
    </voice>
  </speak>`;

  return new Promise((resolve, reject) => {
    const ws = new WebSocket(EDGE_TTS_URL);
    const audioChunks = [];
    let configSent = false;
    let timer = setTimeout(() => { ws.close(); reject(new Error('TTS 超时')); }, 15000);

    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      // 1) 发送配置
      const configMsg = `X-Timestamp:${new Date().toISOString()}\r\n` +
        `Content-Type:application/json; charset=utf-8\r\n` +
        `Path:speech.config\r\n\r\n` +
        JSON.stringify({
          context: {
            synthesis: {
              audio: {
                metadataoptions: { sentenceBoundaryEnabled: "false", wordBoundaryEnabled: "false" },
                outputFormat: "audio-24khz-48kbitrate-mono-mp3"
              }
            }
          }
        });
      ws.send(configMsg);
      configSent = true;
    };

    ws.onmessage = (event) => {
      const data = event.data;
      if (typeof data === 'string') {
        // 可能是服务端就绪消息或错误
        if (data.includes('turn.end')) {
          clearTimeout(timer);
          ws.close();
          const totalLength = audioChunks.reduce((s, c) => s + c.byteLength, 0);
          if (totalLength > 0) {
            const merged = new Uint8Array(totalLength);
            let offset = 0;
            for (const chunk of audioChunks) {
              merged.set(new Uint8Array(chunk), offset);
              offset += chunk.byteLength;
            }
            resolve(new Blob([merged], { type: 'audio/mp3' }));
          } else {
            reject(new Error('无音频数据'));
          }
          return;
        }
        // 收到文本消息时，可能是 headers 或 path 信息，接着发送 SSML
        if (data.includes('Path:turn.start') || data.includes('X-StreamId')) {
          const requestId = uuid4().replace(/-/g, '');
          const ssmlMsg = `X-RequestId:${requestId}\r\n` +
            `Content-Type:application/ssml+xml\r\n` +
            `X-Timestamp:${new Date().toISOString()}\r\n` +
            `Path:ssml\r\n\r\n` +
            ssml;
          ws.send(ssmlMsg);
        }
      } else {
        // 二进制音频数据 — 跳过前导边界标记
        let bytes = new Uint8Array(data);

        // 移除 "Path:audio\r\n" 头部（二进制消息开头可能含有）
        const headerEnd = findHeaderEnd(bytes);
        if (headerEnd > 0) {
          bytes = bytes.slice(headerEnd);
        }

        if (bytes.length > 0) audioChunks.push(bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength));
      }
    };

    ws.onerror = () => {
      clearTimeout(timer);
      reject(new Error('TTS WebSocket 连接失败'));
    };

    ws.onclose = () => {
      clearTimeout(timer);
    };
  });
}

// 在二进制数据中查找 "\r\n\r\n" 分隔位置
function findHeaderEnd(bytes) {
  for (let i = 0; i < bytes.length - 3; i++) {
    if (bytes[i] === 13 && bytes[i+1] === 10 && bytes[i+2] === 13 && bytes[i+3] === 10) {
      return i + 4;
    }
  }
  return -1;
}

function escapeXml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function playAudio(url) {
  return new Promise((resolve) => {
    const a = new Audio(url);
    a.onended = () => resolve();
    a.onerror = () => resolve(); // 播放失败不阻塞流程
    a.play().catch(() => resolve());
  });
}

function restartListeningIfNeeded() {
  if (state.autoDialogue && speechErrorCount === 0 && state.recognition && !state.isThinking) {
    setTimeout(() => {
      if (state.autoDialogue && speechErrorCount === 0 && !state.isSpeaking && !state.isThinking && !state.isListening) {
        try { state.recognition.start(); } catch(_) {}
      }
    }, 400);
  }
}

function removeWhiteBackground(img) {
  const w = img.naturalWidth, h = img.naturalHeight;
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const octx = off.getContext('2d');
  octx.drawImage(img, 0, 0);
  const imgData = octx.getImageData(0, 0, w, h);
  const data = imgData.data;
  const total = w * h;

  // ====== 第一遍：标记纯白/近白背景像素 ======
  const bgMask = new Uint8Array(total);
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    const avg = (r + g + b) / 3;
    const diff = Math.max(r, g, b) - Math.min(r, g, b);
    // 必须很亮（>245）、几乎无色差（<20）、且RGB都大
    if (r > 245 && g > 245 && b > 245 && avg > 248 && diff < 20) {
      bgMask[i >> 2] = 1;
      data[i + 3] = 0;
    }
  }

  // ====== 第二遍：清除白色噪点（孤立的高亮像素群） ======
  // 使用泛洪填充：遍历所有非背景但高亮的像素，如果连通区域 < 80 像素就全部去掉
  const visited = new Uint8Array(total);
  const isBright = new Uint8Array(total);
  for (let i = 0; i < data.length; i += 4) {
    const idx = i >> 2;
    if (bgMask[idx]) continue;
    const r = data[i], g = data[i+1], b = data[i+2];
    const avg = (r + g + b) / 3;
    const diff = Math.max(r, g, b) - Math.min(r, g, b);
    // 标记高亮且低饱和的像素为"可疑白点"
    if (avg > 210 && diff < 35) isBright[idx] = 1;
  }

  // BFS 泛洪找连通的高亮区域
  for (let i = 0; i < total; i++) {
    if (!isBright[i] || visited[i] || bgMask[i]) continue;
    // BFS
    const queue = [i];
    const region = [i];
    visited[i] = 1;
    let head = 0;
    while (head < queue.length) {
      const cur = queue[head++];
      const y = Math.floor(cur / w), x = cur % w;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          const ny = y + dy, nx = x + dx;
          if (ny < 0 || ny >= h || nx < 0 || nx >= w) continue;
          const ni = ny * w + nx;
          if (visited[ni] || bgMask[ni] || !isBright[ni]) continue;
          visited[ni] = 1;
          queue.push(ni);
          region.push(ni);
        }
      }
    }
    // 小区域（<80px）→ 全部设为透明（是白云/噪点/反光）
    // 大区域 → 保留（可能是浅色衣物）
    if (region.length < 80) {
      for (const ri of region) {
        bgMask[ri] = 1;
        data[ri << 2 | 3] = 0;
      }
    }
  }

  // ====== 第三遍：清除右下角水印（"豆包AI生成"） ======
  // 水印通常在图片右下角，占 18% 宽 × 10% 高
  const wmLeft = Math.floor(w * 0.82);
  const wmTop = Math.floor(h * 0.88);
  for (let y = wmTop; y < h; y++) {
    for (let x = wmLeft; x < w; x++) {
      const idx = y * w + x;
      if (bgMask[idx]) continue; // 已经是背景
      const pi = idx << 2;
      const r = data[pi], g = data[pi+1], b = data[pi+2];
      const avg = (r + g + b) / 3;
      // 水印文字特征：白色或浅灰色，高亮度低饱和
      // 只要亮度 > 180 且接近灰度（RGB分量接近），就是水印/文字，直接去掉
      const diffRg = Math.abs(r - g);
      const diffRb = Math.abs(r - b);
      const diffGb = Math.abs(g - b);
      if (avg > 170 && diffRg < 40 && diffRb < 40 && diffGb < 40) {
        bgMask[idx] = 1;
        data[pi + 3] = 0;
      }
    }
  }

  // ====== 第四遍：边缘羽化 — 仅处理与背景相邻的真实边缘 ======
  for (let y = 2; y < h - 2; y++) {
    for (let x = 2; x < w - 2; x++) {
      const idx = y * w + x;
      if (bgMask[idx]) continue;
      // 统计3x3邻域中背景像素数
      let cnt = 0;
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 1; dx++)
          if (bgMask[(y + dy) * w + (x + dx)]) cnt++;
      // 需要足够多背景邻居才羽化（保护人物主体）
      if (cnt >= 5) {
        const pi = idx << 2;
        const brightness = (data[pi] + data[pi+1] + data[pi+2]) / 3;
        // 暗色区域不羽化（人物核心）
        if (brightness < 80) continue;
        // 渐进羽化
        let alpha = 1 - (cnt - 4) / 10;
        alpha = Math.max(0.2, alpha);
        if (brightness > 200) alpha = Math.max(0.55, alpha); // 浅色衣物保留更多
        data[pi + 3] = Math.floor(data[pi + 3] * alpha);
      }
    }
  }

  octx.putImageData(imgData, 0, 0);
  const out = new Image();
  out.src = off.toDataURL('image/png');
  return out;
}

let processedCharacter = null;

// ========== 角色位置与尺寸 ==========
// 图片中人物关键点的相对位置（基于原图比例）
const CHAR_REFS = {
  mouthX: 0.56,   // 嘴部水平位置（脸在右侧，嘴略偏右）
  mouthY: 0.335,  // 嘴部垂直位置（在胡须与上唇之间）
  mouthW: 0.055,  // 嘴部宽度
  mouthH: 0.022,  // 嘴部基准高度
  handX: 0.45,    // 右手（扶腰带处）
  handY: 0.73,    // 手部垂直位置
};

function getCharLayout() {
  const w = scenePanel.clientWidth;
  const h = scenePanel.clientHeight;
  // 人物占画面高度约 85%，保持左侧站立
  const maxH = h * 0.85;
  const imgAspect = (displayCharacter || characterImg).naturalWidth / (displayCharacter || characterImg).naturalHeight || 0.75;
  const drawH = Math.min(maxH, w * 0.6 * (1 / imgAspect));
  const drawW = drawH * imgAspect;
  const x = w * 0.08;  // 靠左，留一点边距
  const y = (h - drawH);  // 底部对齐
  return { x, y, w: drawW, h: drawH };
}

// ========== 说话时嘴部微动 ==========
function drawSpeakingMouth(layout, openAmount) {
  if (openAmount < 0.05) return; // 几乎闭嘴时不绘制
  const mx = layout.x + layout.w * CHAR_REFS.mouthX;
  const my = layout.y + layout.h * CHAR_REFS.mouthY;
  const mw = layout.w * CHAR_REFS.mouthW;
  const mh = layout.h * CHAR_REFS.mouthH * (1 + openAmount * 0.6);

  ctx.save();
  ctx.translate(mx, my);

  // 仅一条极淡的深色唇缝，模拟嘴巴微张
  ctx.fillStyle = `rgba(100, 60, 55, ${0.12 + openAmount * 0.15})`;
  ctx.beginPath();
  ctx.ellipse(0, 0, mw * 0.38, mh * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawHandAura(layout, glow) {
  const hx = layout.x + layout.w * CHAR_REFS.handX;
  const hy = layout.y + layout.h * CHAR_REFS.handY;
  const size = Math.min(layout.w, layout.h) * 0.12 * glow; // 缩小光圈

  // 极淡的暖光晕
  const grad = ctx.createRadialGradient(hx, hy, 0, hx, hy, size);
  grad.addColorStop(0, 'rgba(255, 215, 130, 0.15)');
  grad.addColorStop(0.5, 'rgba(201, 168, 76, 0.06)');
  grad.addColorStop(1, 'rgba(201, 168, 76, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(hx, hy, size, 0, Math.PI * 2);
  ctx.fill();

  // 极淡微光点（减少数量和亮度）
  ctx.fillStyle = `rgba(255, 230, 160, ${0.15 * glow})`;
  for (let i = 0; i < 2; i++) {
    const angle = (state.time || 0) * 0.6 + i * Math.PI;
    const r = size * (0.3 + i * 0.12);
    const px = hx + Math.cos(angle) * r;
    const py = hy + Math.sin(angle) * r * 0.4;
    ctx.beginPath();
    ctx.arc(px, py, 1.2 + i * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ========== 主渲染 ==========
const clock = { last: performance.now() };

function animate(now) {
  requestAnimationFrame(animate);

  const dt = Math.min((now - clock.last) / 1000, 0.1);
  clock.last = now;

  resizeCanvas();
  const w = scenePanel.clientWidth;
  const h = scenePanel.clientHeight;
  if (w === 0 || h === 0) return;

  ctx.clearRect(0, 0, w, h);

  if (!state.loaded || !displayCharacter) return;

  const layout = getCharLayout();

  // 说话时：整体轻微呼吸起伏 + 手势光晕
  let bobX = 0, bobY = 0, scale = 1, auraGlow = 0, headTilt = 0;
  if (state.isSpeaking) {
    state.time += dt * 5;
    const breath = Math.sin(state.time) * 0.5 + 0.5; // 0 ~ 1
    const breath2 = Math.sin(state.time * 0.55) * 0.5 + 0.5;

    bobY = breath * layout.h * 0.005;           // 身体微起伏
    bobX = Math.sin(state.time * 0.5) * layout.w * 0.0015; // 极微左右
    scale = 1 + breath * 0.003;                 // 微呼吸缩放
    headTilt = (breath2 - 0.5) * 0.005;         // 头部微微点动
    auraGlow = 0.4 + breath * 0.3;

    // 嘴部微张节拍
    const open = (Math.sin(state.time * 1.6) * 0.5 + 0.5) * 0.4 + 0.05;
    state.mouthOpen = state.mouthOpen * 0.65 + open * 0.35;
  } else {
    state.mouthOpen = state.mouthOpen * 0.8;
  }

  ctx.save();
  const cx = layout.x + layout.w * 0.45;  // 旋转中心：人物躯干中线
  const cy = layout.y + layout.h * 0.55;  // 旋转中心：胸腰位置
  ctx.translate(cx, cy);
  ctx.rotate(headTilt);
  ctx.scale(scale, scale);
  ctx.translate(-cx + bobX, -cy + bobY);
  ctx.drawImage(displayCharacter, layout.x, layout.y, layout.w, layout.h);

  // 说话时叠加嘴部与手势光晕（在变换坐标系内，始终与人物贴合）
  if (state.isSpeaking) {
    drawHandAura(layout, auraGlow);
    drawSpeakingMouth(layout, state.mouthOpen);
  }

  ctx.restore();
}

// ========== DeepSeek API 对话 ==========
function getDeepSeekKey() {
  return localStorage.getItem('deepseek_api_key') || '';
}

function getSystemPrompt() {
  return localStorage.getItem('deepseek_system_prompt')
    || '你是古代清正廉明的官员，50岁左右，说话温文尔雅、引经据典，用半文言白话。对方是来请教廉洁文化、道德修养之人。回答时：1)引用古代廉政典故（包拯、海瑞、于成龙等）；2)结合现代法规精神；3)语风温和敦厚如长者；4)回答简洁，控制在150字以内。若对方自述困惑或悔过，耐心劝导、指正道义。';
}

async function callDeepSeek(userMessage) {
  const apiKey = getDeepSeekKey();
  if (!apiKey) return null;

  // 构建消息列表
  const messages = [
    { role: 'system', content: getSystemPrompt() },
    ...state.conversationHistory,
    { role: 'user', content: userMessage }
  ];

  try {
    const res = await fetch(DEEPSEEK_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: messages,
        max_tokens: 600,
        temperature: 0.85,
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      console.error('DeepSeek API error:', res.status, err);
      if (res.status === 401) return '__INVALID_KEY__';
      if (res.status === 402) return '__NO_BALANCE__';
      return null;
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content?.trim();
    if (!reply) return null;

    // 更新对话历史（保留最近10轮）
    state.conversationHistory.push(
      { role: 'user', content: userMessage },
      { role: 'assistant', content: reply }
    );
    if (state.conversationHistory.length > CONVERSATION_MAX * 2) {
      state.conversationHistory = state.conversationHistory.slice(-CONVERSATION_MAX * 2);
    }

    return reply;
  } catch (e) {
    console.error('DeepSeek API 网络错误:', e);
    return null;
  }
}

// ========== 关键词匹配（本地知识库优先） ==========
// 返回 { response, source: 'kb' | 'fallback' | 'none' }
function findResponse(input) {
  const n = input.toLowerCase().trim();
  let best = null, bestScore = 0;
  for (const e of knowledgeBase) {
    let score = 0;
    for (const kw of e.keywords) {
      if (n.includes(kw.toLowerCase())) score += kw.length;
    }
    if (score > bestScore) { bestScore = score; best = e; }
  }
  if (best && bestScore >= 2) {
    return { response: best.response, source: 'kb', score: bestScore };
  }
  const related = ['廉洁','清廉','反腐','贪','廉','清风','清官','廉政','正直','公正','贿赂','受贿','违纪','违法','送礼','吃请','公款','招标','家属','围猎','挪用','赌博','灰色'];
  if (related.some(w => n.includes(w))) {
    return { response: fallbackResponses[Math.floor(Math.random() * fallbackResponses.length)], source: 'fallback' };
  }
  return { response: '阁下所言，虽非直接论廉，却也引人深思。万事万物皆有"廉"——处事公道、待人以诚、不取不义之财，皆是廉洁精神的体现。不妨谈谈你对廉洁的看法？', source: 'none' };
}

// ========== 对话处理 ==========
async function handleUserInput(text) {
  if (state.isThinking || !text.trim()) return;
  state.isThinking = true;

  // 处理期间停止监听
  if (state.isListening && state.recognition) {
    try { state.recognition.stop(); } catch(_) {}
  }

  addMessage('user', text);
  textInput.value = '';
  setStatus('thinking');

  let response;
  let sourceUsed = '';

  // 第一步：始终先搜本地知识库
  const kbResult = findResponse(text);

  // 第二步：若知识库精确命中（score高），直接返回，不调 API
  if (kbResult.source === 'kb') {
    response = kbResult.response;
    sourceUsed = '本地知识库';
  }
  // 第三步：未精确命中但有 DeepSeek Key → 调 AI
  else if (getDeepSeekKey()) {
    const aiResponse = await callDeepSeek(text);
    if (aiResponse === '__INVALID_KEY__') {
      response = '⚠️ API Key 无效或已过期，请重新设置。【已自动切换为本地知识库】';
      localStorage.removeItem('deepseek_api_key');
      updateAiStatus();
    } else if (aiResponse === '__NO_BALANCE__') {
      response = '⚠️ API 余额不足，请充值后重试。【已自动切换为本地知识库】';
      updateAiStatus();
    } else if (aiResponse) {
      response = aiResponse;
      sourceUsed = 'DeepSeek AI';
    } else {
      // AI 网络错误，用知识库兜底结果
      response = kbResult.response;
      sourceUsed = '本地知识库（AI 不可用）';
    }
  }
  // 第四步：无 Key，用知识库结果
  else {
    response = kbResult.response;
    sourceUsed = '本地知识库';
  }

  console.log('📨 回复来源:', sourceUsed);
  const msgEl = addMessage('ai', response);

  // 显示文字 + 微软 Edge TTS 语音朗读
  speakText(response, msgEl);

  state.isThinking = false;
  if (!state.autoDialogue) setStatus('ready');
  restartListeningIfNeeded();
}

sendBtn.addEventListener('click', () => {

textInput.addEventListener('keydown', e => {

    const t = textInput.value.trim();
    if (t) handleUserInput(t);

});

    btnSettings.classList.add('ai-active');
    btnSettings.textContent = 'AI 已连接';
  } else {
    btnSettings.classList.remove('ai-active');
    btnSettings.textContent = 'AI模型';
  }

  settingsOverlay.classList.add('open');

  const key = apiKeyInput.value.trim();
  const prompt = systemPromptInput.value.trim();
  if (key && !key.startsWith('sk-')) {
    settingsMsg.textContent = '⚠️ API Key 格式不正确，应以 sk- 开头';
    settingsMsg.className = 'status-msg warn';
    return;
  }
  if (key) localStorage.setItem('deepseek_api_key', key);
  else localStorage.removeItem('deepseek_api_key');
  if (prompt) localStorage.setItem('deepseek_system_prompt', prompt);
  updateAiStatus();
  settingsMsg.textContent = key ? '✅ 设置已保存，DeepSeek AI 已启用' : '✅ Key 已清除，使用本地知识库';
  settingsMsg.className = 'status-msg ok';
  // 清除旧对话历史（角色可能变了）
  state.conversationHistory = [];
  setTimeout(() => settingsOverlay.classList.remove('open'), 1500);
});

  localStorage.removeItem('deepseek_api_key');
  updateAiStatus();
  state.conversationHistory = [];
  settingsMsg.textContent = '✅ Key 已清除，使用本地知识库';
  settingsMsg.className = 'status-msg ok';
});

// ========== 启动 ==========
function init() {
  resizeCanvas();
  startCamera();
  initSpeechRecognition();
  updateAiStatus();
  setStatus('ready');
  clock.last = performance.now();
  requestAnimationFrame(animate);

  // 默认开启自动语音对话
  if (state.recognition) {
    autoBtn.classList.remove('off');
    autoBtn.textContent = '🔄 自动对话中';
    setTimeout(() => {
      try { state.recognition.start(); } catch(_) {
        showToast('语音启动失败，请点击按钮重试或手动输入');
      }
    }, 1200);
  }
}

init();

console.log('🏛️  千年一晤 v7.3 — 知识库优先 + DeepSeek AI 备用');
console.log('  - AI 模型：DeepSeek V3（需配置 Key）');
console.log('  - 语音合成：Edge TTS WebSocket');
console.log('  - 自动对话模式：已开启');
</script>
